[CLI]
# Default quality / background. Override with -qh etc.
# NOTE: keep this file ASCII-only; manim reads it via configparser
# with the OS locale encoding (cp932 on JP Windows), so non-ASCII breaks it.
background_color = #0E1116
frame_rate = 30
pixel_height = 1080
pixel_width = 1920
media_dir = ./media
disable_caching = False
max_files_cached = 1000
